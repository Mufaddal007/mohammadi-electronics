<aside class="w-full md:w-64 bg-slate-900 border-b md:border-b-0 md:border-r border-slate-800 flex flex-col shrink-0">
  <!-- Admin Header Area -->
  <div class="p-6 border-b border-slate-800/80 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="p-1.5 bg-amber-500 rounded text-slate-950 font-bold">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </div>
      <div>
        <h2 class="text-sm font-bold text-slate-100 uppercase tracking-wider font-mono">Control Panel</h2>
        <p class="text-xs text-amber-500 font-medium font-mono">Admin Mode</p>
      </div>
    </div>
  </div>

  <!-- Admin Links Navigation -->
  <nav class="flex-1 px-4 py-6 space-y-1.5">
    @for (item of menuItems; track item.path) {
      <a
        [routerLink]="item.path"
        [routerLinkActive]="'bg-slate-800 text-teal-400 border border-slate-700 shadow-lg shadow-teal-500/5'"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-100 hover:bg-slate-800/40 border border-transparent transition-all duration-200"
      >
        <!-- Render Dynamic SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" [innerHTML]="item.svgIcon">
        </svg>
        {{ item.label }}
      </a>
    }
  </nav>

  <!-- Sidebar Footer Return Link -->
  <div class="p-4 border-t border-slate-800/80 space-y-2">
    <a
      routerLink="/"
      class="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/20 transition-all duration-200 group"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      Customer Site
    </a>

    <button
      (click)="logout()"
      class="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-slate-950 border border-slate-800 hover:border-rose-500/25 rounded-xl text-xs font-semibold text-slate-400 hover:text-rose-400 hover:bg-rose-500/10 transition-all duration-200 cursor-pointer font-mono uppercase"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      Log Out
    </button>
  </div>
</aside>
